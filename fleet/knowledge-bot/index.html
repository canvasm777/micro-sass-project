<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Bot 🧠 | 기업 커스텀 지식 비서</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../../assets/scripts/ads-engine.js"></script>
    <script src="../../auth.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>Knowledge Bot 🧠</h1>
            <p>사장님의 기업 데이터를 학습한 '무한 지식 전문가'를 소환하세요.</p>
        </header>

        <main>
            <!-- Knowledge Base Setup -->
            <section class="brain-sync-zone">
                <div class="sync-header">
                    <h3>Brain Sync Status 🧬</h3>
                    <div id="indexStatus" class="status-badge">Idle</div>
                </div>
                
                <div class="upload-container" id="uploadZone">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>내부 매뉴얼, 기획서, PDF 등을 업로드하세요</p>
                    <input type="file" id="fileInput" hidden multiple>
                    <button class="secondary-btn" onclick="document.getElementById('fileInput').click()">파일 선택</button>
                </div>

                <div id="indexingProgress" class="hidden">
                    <div class="progress-bar">
                        <div class="progress-fill" id="fill"></div>
                    </div>
                    <p id="progressText">벡터 데이터베이스 동기화 중...</p>
                </div>
            </section>

            <!-- Chat Interface -->
            <section class="expert-chat">
                <div class="chat-header">
                    <span>Expert AI Online</span>
                    <i class="fa-solid fa-bolt" style="color: #d4af37;"></i>
                </div>
                <div id="chatWindow">
                    <div class="msg system">데이터를 업로드하면 해당 문서 기반으로 답변을 드립니다.</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="userInput" placeholder="문서 내용에 대해 무엇이든 물어보세요..." disabled>
                    <button id="sendBtn" disabled><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </section>
        </main>

        <footer>
            <div class="app-switcher">
                <a href="../../core/sns-spark/index.html">Spark</a>
                <a href="../../core/interview-ace/index.html">Ace</a>
                <a href="../va-agency/index.html">VA</a>
                <a href="../lead-sniper/index.html">Sniper</a>
                <a href="../global-dubber/index.html">Dubber</a>
                <a href="../knowledge-bot/index.html" class="active">Bot</a>
            </div>
            <p>© 2026 Kodari Autonomous Empire - Neural Knowledge Base</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
