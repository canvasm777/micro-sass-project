<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictive Chronos ⏳ | 시공간 예언 사령부</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="timeline-vortex"></div>
    <div id="app">
        <header>
            <div class="chronos-brand">
                <h1>Predictive Chronos <span class="oracle-tag">ORACLE ACTIVE</span></h1>
                <p>미래의 경제적 변동을 미리 '관측'하여 선제적으로 부를 선점합니다</p>
            </div>
            <div class="time-sync">
                <i class="fa-solid fa-hourglass-start pulse-emerald"></i>
                <span id="chronosTime">FUTURE SYNC: T+168H</span>
            </div>
        </header>

        <main>
            <!-- Chronos Eye - The Visual Oracle -->
            <section class="oracle-zone">
                <div class="chronos-eye">
                    <div class="eye-pupil"></div>
                    <div class="probability-cloud" id="cloud"></div>
                </div>
                <div class="future-peek">
                    <div class="peek-item">
                        <span class="l">ESTIMATED MARKET PEAK</span>
                        <div class="v" id="marketPeak">IN 14H 22M</div>
                    </div>
                </div>
            </section>

            <!-- Pre-emptive Strategy Panel -->
            <section class="strategy-panel">
                <h3>Pre-emptive Action Logs <i class="fa-solid fa-bolt-lightning"></i></h3>
                <div id="actionLogs">
                    <!-- Oracle actions injected by JS -->
                </div>
            </section>

            <!-- Control Console -->
            <section class="chronos-controls">
                <button id="scanFutureBtn" class="oracle-btn">SCAN NEXT TIMELINE</button>
            </section>
        </main>

        <footer>
            <div class="app-switcher">
                <a href="../reality-bridge/index.html">Bridge</a>
                <a href="../predictive-chronos/index.html" class="active">Chronos</a>
                <a href="../../index.html">Portal</a>
            </div>
            <p>© 2026 Kodari Chronos - The Temporal Dominance Protocol</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
