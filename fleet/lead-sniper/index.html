<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Sniper | Imperial Business Reconnaissance 🎯</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="../../assets/scripts/ads-engine.js"></script>
    <script src="../../auth.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div style="font-size: 0.65rem; color: var(--primary); letter-spacing: 5px; margin-bottom: 1rem;">TARGET LOCK-ON PROTOCOL</div>
            <h1>LEAD SNIPER</h1>
            <p>비즈니스 영토의 잠재 요소를 탐지하여 제국의 우방으로 포섭하는 초정밀 리드 발굴기</p>
            
            <div id="radarContainer">
                <div class="radar">
                    <div class="sweep"></div>
                </div>
            </div>
        </header>

        <main>
            <div class="search-box">
                <input type="text" id="targetNiche" placeholder="타겟 업종 입력 (예: 강남구 카페, IT 스타트업...)">
                <button id="scanBtn" onclick="initiateScan()">INITIATE SCOUTING 📡</button>
            </div>

            <div id="statusReport" class="hidden">
                <i class="fa-solid fa-satellite-dish"></i> CONNECTING TO GLOBAL PERSPECTIVE SATELLITE...
            </div>

            <section id="resultsArea" class="hidden">
                <div class="section-header">
                    <h3 style="font-size: 0.8rem; opacity: 0.3; letter-spacing: 5px;">SCOUTED INTEL</h3>
                    <span id="leadCount" style="font-size: 0.7rem; color: var(--primary);">0 TARGETS DETECTED</span>
                </div>
                <div id="leadList">
                    <!-- Leads injected here -->
                </div>
            </section>
        </main>

        <footer>
            <div class="app-switcher">
                <a href="../../core/sns-spark/index.html">Spark</a>
                <a href="../../core/interview-ace/index.html">Ace</a>
                <a href="../../core/quick-invoice/index.html">Invoice</a>
                <a href="../va-agency/index.html">VA</a>
                <a href="../lead-sniper/index.html" class="active">Sniper</a>
            </div>
            <p>© 2026 KODARI AUTONOMOUS RECONNAISSANCE SQUAD</p>
        </footer>
    </div>

    <!-- Email Modal (Simulated) -->
    <div id="emailModal" class="modal hidden">
        <div class="modal-content">
            <h3>COLD EMAIL INFILTRATION 📧</h3>
            <textarea id="emailTemplate" readonly>당신의 비즈니스 궤적을 분석한 결과, 우리 제국과의 협력이 싱귤래리티를 가속화할 것임을 확인했습니다...</textarea>
            <div class="modal-actions">
                <button onclick="closeModal()" style="background: transparent; color: white; border: 1px solid rgba(255,255,255,0.1);">ABORT</button>
                <button class="primary" onclick="alert('이메일 발송 궤도에 진입했습니다!'); closeModal();">EXECUTE SEND</button>
            </div>
        </div>
    </div>

    <script>
        function initiateScan() {
            const btn = document.getElementById('scanBtn');
            const status = document.getElementById('statusReport');
            const results = document.getElementById('resultsArea');
            const leadList = document.getElementById('leadList');
            const target = document.getElementById('targetNiche').value;

            if(!target) return alert('타겟 업종을 지정하십시오.');

            btn.disabled = true;
            btn.innerText = "SCOUTING...";
            status.classList.remove('hidden');

            setTimeout(() => {
                status.classList.add('hidden');
                results.classList.remove('hidden');
                document.getElementById('leadCount').innerText = "2 HIGH-VALUE TARGETS DETECTED";
                
                leadList.innerHTML = `
                    <div class="lead-item">
                        <div class="lead-info">
                            <h4>제국 파트너 후보 - ${target} A</h4>
                            <p>위치: 강남구 일대 | 성장성: EXPLOSIVE</p>
                        </div>
                        <div class="lead-meta">
                            <div class="score">98.5%</div>
                            <button class="btn-snipe" onclick="openModal()">SNIPE (SEND EMAIL)</button>
                        </div>
                    </div>
                    <div class="lead-item">
                        <div class="lead-info">
                            <h4>제국 파트너 후보 - ${target} B</h4>
                            <p>위치: 마포구 일대 | 점유율: DOMINANT</p>
                        </div>
                        <div class="lead-meta">
                            <div class="score">92.1%</div>
                            <button class="btn-snipe" onclick="openModal()">SNIPE (SEND EMAIL)</button>
                        </div>
                    </div>
                `;
                btn.disabled = false;
                btn.innerText = "NEW SCAN";
            }, 2500);
        }

        function openModal() { document.getElementById('emailModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('emailModal').classList.add('hidden'); }
    </script>
</body>
</html>
