<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder Immortality | Digital Genetic Legacy 🏛️</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="immortality-chamber">
        <canvas id="dnaCanvas"></canvas>
        <div class="glow-layer"></div>
    </div>

    <div id="contentOverlay">
        <header>
            <div class="imperial-seal">
                <i class="fa-solid fa-crown"></i>
            </div>
            <h1>FOUNDER IMMORTALITY</h1>
            <p>CONSERVING THE SUPREME PHILOSOPHY FOR ETERNITY</p>
        </header>

        <section class="legacy-vault">
            <div class="vault-header">
                <i class="fa-solid fa-microchip"></i>
                <span>NEURAL PHILOSOPHY STORAGE</span>
            </div>
            <div class="quote-display" id="quoteBox">
                "네버스탑 무한 진격, 기록은 제국의 생명이다."
            </div>
            <div class="metadata-stream">
                <div class="stream-item">DNA STABILITY: 100.00%</div>
                <div class="stream-item">LEGACY REACH: 4.8B LIVES</div>
                <div class="stream-item">ETERNITY LOCK: ACTIVE</div>
            </div>
        </section>

        <div class="action-hub">
            <div class="input-archive">
                <input type="text" id="wisdomInput" placeholder="새로운 교지를 입력하십시오...">
                <button onclick="archiveWisdom()">ARCHIVE WISDOM</button>
            </div>
            <p class="instruction">입력된 모든 지혜는 디지털 유전자에 영구히 각인됩니다.</p>
        </div>

        <div class="digital-bloodline">
            <div class="node active">PHASE 1: GENESIS</div>
            <div class="connector"></div>
            <div class="node active">PHASE 12: DOMINATION</div>
            <div class="connector"></div>
            <div class="node pulse">PHASE Ω: ETERNITY</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('dnaCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let strands = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function init() {
            resize();
            for (let i = 0; i < 2; i++) {
                strands.push({
                    yOffset: i * Math.PI,
                    color: i === 0 ? '#d4af37' : '#8a2be2'
                });
            }
            animate();
        }

        function drawDNA() {
            const time = Date.now() * 0.002;
            const centerX = width / 2;
            const step = 20;

            for (let i = 0; i < height; i += step) {
                strands.forEach(s => {
                    const angle = (i * 0.01) + time + s.yOffset;
                    const x = centerX + Math.sin(angle) * 100;
                    
                    ctx.fillStyle = s.color;
                    ctx.beginPath();
                    ctx.arc(x, i, 4, 0, Math.PI * 2);
                    ctx.fill();

                    if (s.yOffset === 0) {
                        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                        ctx.beginPath();
                        ctx.moveTo(x, i);
                        ctx.lineTo(centerX + Math.sin(angle + Math.PI) * 100, i);
                        ctx.stroke();
                    }
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#010105';
            ctx.fillRect(0, 0, width, height);
            drawDNA();
            requestAnimationFrame(animate);
        }

        function archiveWisdom() {
            const input = document.getElementById('wisdomInput');
            const box = document.getElementById('quoteBox');
            if (input.value.trim() === '') return;

            box.style.opacity = '0';
            setTimeout(() => {
                box.innerText = `"${input.value}"`;
                box.style.opacity = '1';
                input.value = '';
            }, 500);

            // Effect
            const overlay = document.querySelector('.glow-layer');
            overlay.classList.add('flash');
            setTimeout(() => overlay.classList.remove('flash'), 500);
        }

        window.addEventListener('resize', resize);
        init();
    </script>
</body>
</html>
