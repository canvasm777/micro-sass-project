        .btn {

            text-decoration: none; text-transform: uppercase; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            border-radius: 0;
        }
        .btn-gold { background: var(--gold); color: black; }
        .btn-gold:hover { background: var(--gold-light); transform: translateY(-5px); box-shadow: 0 15px 50px rgba(212, 175, 55, 0.3); }
        .btn-outline { border: 1px solid var(--gold); color: var(--gold); }

        .reveal-item i { font-size: 2rem; color: var(--gold); margin-bottom: 2rem; display: block; opacity: 0.6; }
        .reveal-item h3 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 1.5rem; font-weight: 400; }
        .reveal-item p { color: var(--text-dim); font-size: 0.95rem; font-weight: 200; line-height: 1.8; }

        /* The Pricing Table */
        .pricing { padding: 12rem 2rem; background: #080808; text-align: center; border-top: 1px solid var(--border); }
        .price-box {
            max-width: 500px; margin: 0 auto; border: 1px solid var(--border);
            padding: 5rem 3rem; background: rgba(255,255,255,0.01);
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);

        .price-box:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.03); }
        .price-val { font-family: 'Playfair Display', serif; font-size: 4.5rem; color: var(--gold); margin: 3rem 0; font-weight: 400; }
        .price-val span { font-size: 0.9rem; color: var(--text-dim); letter-spacing: 2px; }

        .checklist { list-style: none; text-align: left; margin: 3rem 0; color: var(--text-dim); font-size: 0.85rem; letter-spacing: 1px; }
        .checklist li { margin-bottom: 1.3rem; display: flex; align-items: center; }
        .checklist li i { color: var(--gold); margin-right: 15px; font-size: 0.7rem; }

        footer { text-align: center; padding: 6rem 2rem; opacity: 0.2; font-size: 0.65rem; letter-spacing: 5px; border-top: 1px solid var(--border); }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }

            .cta-group { flex-direction: column; width: 100%; gap: 1rem; }
            .reveal-header h2 { font-size: 2.5rem; }
        }
    </style>
</head>
