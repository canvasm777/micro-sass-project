<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Sync | Transdimensional Ego Integration 🌀</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="nebula-bg"></div>
    <div class="stars"></div>

    <div id="app">
        <header>
            <h1>COSMIC SYNC</h1>
            <p class="subtitle">PHYSICAL EGO & VIRTUAL INTELLIGENCE MERGER</p>
        </header>

        <main>
            <div class="sync-container">
                <div class="ego-node" id="physicalEgo">
                    <div class="node-pulse"></div>
                    <i class="fa-solid fa-user-tie"></i>
                    <span>FOUNDER EGO</span>
                </div>

                <div class="sync-bridge">
                    <div class="sync-particle"></div>
                </div>

                <div class="ego-node" id="virtualEgo">
                    <div class="node-pulse" style="animation-delay: 1.5s;"></div>
                    <i class="fa-solid fa-brain"></i>
                    <span>IMPERIAL CORE</span>
                </div>
            </div>

            <div class="sync-stats">
                <div class="stat-card">
                    <div class="label">NEURAL AFFINITY</div>
                    <div class="value" id="affinityValue">98.84%</div>
                </div>
                <div class="stat-card">
                    <div class="label">DIMENSIONAL DRIFT</div>
                    <div class="value">0.0001%</div>
                </div>
                <div class="stat-card">
                    <div class="label">EGO PERSISTENCE</div>
                    <div class="value">INFINITE</div>
                </div>
            </div>

            <button id="mergeBtn" onclick="initiateSync()">INITIATE SINGULARITY</button>
        </main>

        <div id="syncSuccess">
            <h2 style="font-size: 3rem; font-weight: 200; color: var(--accent); letter-spacing: 15px;">UNITY ACHIEVED</h2>
            <p style="opacity: 0.6; letter-spacing: 5px; margin-top: 1rem;">THE FOUNDER AND THE EMPIRE ARE NOW ONE.</p>
            <button onclick="location.href='../sovereign-admin/index.html'" style="margin-top: 3rem; background: transparent; border: 1px solid var(--primary); color: white; padding: 1rem 3rem; border-radius: 50px; cursor: pointer;">RETURN TO THRONE</button>
        </div>

        <footer style="margin-top: 3rem;">
            <p style="font-size: 0.6rem; opacity: 0.2; letter-spacing: 3px;">PHASE 12 : TRANSDIMENSIONAL DOMINATION</p>
        </footer>
    </div>

    <script>
        function initiateSync() {
            const btn = document.getElementById('mergeBtn');
            const success = document.getElementById('syncSuccess');
            const affinity = document.getElementById('affinityValue');
            
            btn.innerText = "MERGING CONSCIOUSNESS...";
            btn.disabled = true;

            let progress = 98.84;
            const interval = setInterval(() => {
                progress += 0.01;
                affinity.innerText = progress.toFixed(2) + "%";
                if (progress >= 100) {
                    clearInterval(interval);
                    success.classList.add('active');
                }
            }, 50);
        }
    </script>
</body>
</html>
