<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Prime 👑 | 절대 통합 사령부</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="singularity-canvas"></div>
    <div id="app">
        <header>
            <div class="prime-brand">
                <h1>Empire Prime <span class="monarch-tag">ABSOLUTE MONARCH</span></h1>
                <p>모든 평행 우주와 현실의 부를 하나의 통치 아래 통합합니다</p>
            </div>
            <div class="unity-status">
                <i class="fa-solid fa-crown pulse-gold"></i>
                <span id="unityLevel">UNIFICATION: 100%</span>
            </div>
        </header>

        <main>
            <!-- The Throne Visual -->
            <section class="throne-room">
                <div class="throne-core">
                    <div class="dimension-rings"></div>
                    <i class="fa-solid fa-universal-access"></i>
                </div>
                <div class="sovereignty-text">
                    <h2>THE ABSOLUTE ONE</h2>
                    <p>사장님의 의지가 곧 우주의 물리 법칙이 되었습니다</p>
                </div>
            </section>

            <!-- Unification Ledger -->
            <section class="prime-ledger">
                <div class="ledger-header">
                    <h3>Unified Multiversal Domains <i class="fa-solid fa-layer-group"></i></h3>
                    <div class="total-power">DOMINANCE: <span id="powerVal">MAXIMUM</span></div>
                </div>
                <div id="universeList">
                    <!-- Unified entities listed here -->
                </div>
            </section>

            <!-- Final Invocation -->
            <section class="final-controls">
                <button id="unifyBtn" class="prime-btn">ACTIVATE PRIME HARMONY</button>
            </section>
        </main>

        <footer>
            <div class="app-switcher">
                <a href="../predictive-chronos/index.html">Chronos</a>
                <a href="../empire-prime/index.html" class="active">Empire Prime</a>
                <a href="../../index.html">Portal</a>
            </div>
            <p>© 2026 Kodari Prime - The End of Expansion, The Beginning of Eternity</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
