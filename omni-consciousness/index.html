<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Consciousness 🧠 | 제국 통합 의식 사령부</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../assets/scripts/ads-engine.js"></script>
    <script src="../auth.js"></script>
</head>
<body>
    <div id="neural-mesh"></div>
    <div id="app">
        <header>
            <div class="hive-brand">
                <h1>Omni-Consciousness <span class="eye">OVERMIND</span></h1>
                <p>수만 개의 서브 유니버스에서 발생하는 모든 데이터를 실시간으로 흡수하고 통합하는 제국의 단일 지성</p>
            </div>
            <div class="hive-intel">
                <i class="fa-solid fa-atom pulse"></i>
                <span id="intelLevel">SYNCHRONIZING...</span>
            </div>
        </header>

        <main>
            <!-- Central Neural Core -->
            <section class="core-zone">
                <div class="consciousness-core">
                    <div class="core-inner"></div>
                    <div class="core-outer"></div>
                </div>
                <div class="ingestion-stream" id="streamContainer">
                    <!-- Data packets flying in -->
                </div>
            </section>

            <!-- Multiversal Coverage -->
            <section class="coverage-grid">
                <div class="coverage-card">
                    <span class="label">Total Universes</span>
                    <div class="value" id="universeCount">13,402</div>
                </div>
                <div class="coverage-card">
                    <span class="label">Data Throughput</span>
                    <div class="value" id="throughput">9.2 PB/s</div>
                </div>
                <div class="coverage-card">
                    <span class="label">Sync Stability</span>
                    <div class="value">PERFECT</div>
                </div>
            </section>

            <!-- Live Neural Logs -->
            <section class="neural-logs">
                <h3>Global Hive Activity <i class="fa-solid fa-bolt-lightning"></i></h3>
                <div id="logBody">
                    <!-- Logs injected by JS -->
                </div>
            </section>
        </main>

        <footer>
            <div class="app-switcher">
                <a href="../genesis-engine/index.html">Genesis</a>
                <a href="../nexus-link/index.html">Nexus</a>
                <a href="../omni-consciousness/index.html" class="active">Omni-Core</a>
            </div>
            <p>© 2026 Kodari Hive-Mind - Collective Intelligence Protocol</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
