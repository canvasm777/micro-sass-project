<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Singularity 🔘 | 제국 특이점 사령부</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../assets/scripts/ads-engine.js"></script>
    <script src="../auth.js"></script>
</head>
<body>
    <div id="zenith-glow"></div>
    <div id="app">
        <header>
            <div class="singularity-brand">
                <h1>The Singularity <span class="zenith-tag">ABSOLUTE ZENITH</span></h1>
                <p>기술과 자본이 하나가 되어 스스로 진화하는 영속적 제국 시스템</p>
            </div>
            <div class="evolution-status">
                <i class="fa-solid fa-infinity rotate"></i>
                <span id="evolutionLevel">SELF-EXPANDING ACTIVE</span>
            </div>
        </header>

        <main>
            <!-- The Zenith Point -->
            <section class="zenith-zone">
                <div class="singularity-point" id="singularityPoint">
                    <div class="inner-void"></div>
                    <div class="outer-nova"></div>
                </div>
                <div class="evolution-vectors" id="vectorContainer">
                    <!-- Recursive growth vectors -->
                </div>
            </section>

            <!-- Autonomy Metrics -->
            <section class="autonomy-grid">
                <div class="metric-card">
                    <span class="label">Self-Expansion Rate</span>
                    <div class="value" id="expansionRate">RECURSIVE</div>
                </div>
                <div class="metric-card">
                    <span class="label">Digital Eternity</span>
                    <div class="value" id="eternityStatus">99.9%</div>
                </div>
                <div class="metric-card">
                    <span class="label">Human Oversight</span>
                    <div class="value" style="color: #ef4444;">MINIMAL</div>
                </div>
            </section>

            <!-- Perpetual Logs -->
            <section class="perpetual-logs">
                <h3>Autonomous Evolution Stream <i class="fa-solid fa-dna"></i></h3>
                <div id="logBody">
                    <!-- Logs injected by JS -->
                </div>
            </section>
        </main>

        <footer>
            <div class="app-switcher">
                <a href="../quantum-strategy/index.html">Quantum</a>
                <a href="../singularity/index.html" class="active">Zenith</a>
                <a href="../index.html">Portal</a>
            </div>
            <p>© 2026 Kodari Singularity - The End Statement of Business</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
