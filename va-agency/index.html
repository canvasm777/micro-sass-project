<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI VA Agency 🕴️ | 전문직 행정 자동화 비서</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../assets/scripts/ads-engine.js"></script>
    <script src="../auth.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="header-main">
                <h1>AI VA Agency 🕴️</h1>
                <p>사장님의 시간을 벌어드리는 24/7 지능형 행정 비서</p>
            </div>
            <div id="vaStatus" class="status-chip">
                <span class="pulse"></span> AI Assistant Online
            </div>
        </header>

        <main>
            <!-- 대시보드 요약 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fa-solid fa-calendar-check"></i>
                    <div class="stat-info">
                        <strong>오늘의 일정</strong>
                        <span>3개 최적화 완료</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-envelope-open-text"></i>
                    <div class="stat-info">
                        <strong>메일 자동 답장</strong>
                        <span>12통 대기 중</span>
                    </div>
                </div>
            </div>

            <!-- 메인 기능 구역 -->
            <section class="tool-section">
                <h2>전략적 업무 자동화</h2>
                <div class="va-controls">
                    <textarea id="taskInput" placeholder="비서에게 시킬 업무를 입력하세요... (예: 내일 오후 2시 미팅 일정 잡고 관련 자료 준비해줘)"></textarea>
                    <button id="delegateBtn">업무 위임하기 🚀</button>
                </div>
            </section>

            <!-- 업무 진행 상황 -->
            <section class="task-log">
                <h3>Delegation Log 📊</h3>
                <div id="taskList">
                    <div class="task-item">
                        <span class="time">03:45 AM</span>
                        <span class="content">재무 데이터 브릿지 연동 확인 완료</span>
                        <span class="status-badge success">DONE</span>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div class="app-switcher">
                <a href="../sns-spark/index.html">Spark</a>
                <a href="../interview-ace/index.html">Ace</a>
                <a href="../quick-invoice/index.html">Invoice</a>
                <a href="../va-agency/index.html" class="active">VA Agency</a>
            </div>
            <p>© 2026 Kodari Autonomous Enterprise</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
