<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../mobile-fix.css">
    <style>
        :root {
            --bg: #0a0a0b; 
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.2);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --card: rgba(255, 255, 255, 0.02);
            --border: rgba(212, 175, 55, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Montserrat', sans-serif; overflow-x: hidden;
            background: radial-gradient(circle at 50% -20%, #1a1a1c 0%, #0a0a0b 70%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .container { width: 95%; max-width: 600px; text-align: center; padding: 3rem 0; }

        .tag { font-size: 0.65rem; letter-spacing: 5px; color: var(--gold); margin-bottom: 1.5rem; display: block; opacity: 0.8; }
        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 400; margin-bottom: 0.5rem; letter-spacing: -1px; }
        .subtitle { color: var(--text-dim); font-size: 0.9rem; font-weight: 200; letter-spacing: 2px; margin-bottom: 3rem; }

        /* Tarot Display Area */
        .tarot-stage {
            height: 380px; display: flex; justify-content: center; align-items: center; margin-bottom: 3rem;
        }
        .tarot-card {
            width: 220px; height: 350px; perspective: 1200px; cursor: pointer;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1); transform-style: preserve-3d;
        }
        .tarot-card.flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 0px; border: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .card-back {
            background: #000; border-color: var(--gold);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(212, 175, 55, 0.05) 10px, rgba(212, 175, 55, 0.05) 20px);
        }
        .card-back::after {
            content: 'K'; font-family: 'Playfair Display', serif; font-size: 4rem; color: var(--gold-dim);
        }
        .card-front {
            background: #0a0a0b; transform: rotateY(180deg); padding: 2rem;
            border-color: var(--gold);
        }
        .card-front i { font-size: 3rem; color: var(--gold); margin-bottom: 2rem; }
        .card-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); margin-bottom: 1rem; }
        .card-lore { font-size: 0.75rem; color: var(--text-dim); line-height: 1.6; }

        /* Ad Area */
        .ad-row {
            background: var(--card); border: 1px solid var(--border);
            padding: 1.5rem; margin-bottom: 2rem; font-size: 0.6rem; color: var(--text-dim);
            letter-spacing: 2px; text-transform: uppercase;
        }

        .action-btn {
            width: 100%; background: var(--gold); color: black; border: none;
            padding: 1.3rem; font-size: 0.85rem; font-weight: 700; letter-spacing: 3px;
            cursor: pointer; transition: 0.4s;
        }
        .action-btn:hover { background: #f3e5ab; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212,175,55,0.2); }

        .reading-panel {
            background: var(--card); border: 1px solid var(--border); padding: 2.5rem;
            text-align: left; margin-top: 3rem; display: none; animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .reading-panel h4 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold); margin-bottom: 1rem; border-left: 3px solid var(--gold); padding-left: 15px; }

        .back-link { 
            margin-top: 4rem; color: var(--text-dim); text-decoration: none; 
            font-size: 0.7rem; letter-spacing: 3px; border-bottom: 1px solid transparent; transition: 0.3s;
        }
        .back-link:hover { color: var(--gold); border-bottom-color: var(--gold); }

        .timestamp { font-size: 0.6rem; color: var(--text-dim); margin-top: 2rem; letter-spacing: 2px; }
    </style>
</head>
