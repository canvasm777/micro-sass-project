<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Tarot | Business Destiny</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0b; --gold: #d4af37; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: "Montserrat"; text-align: center; padding: 100px 0; }
        .tarot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; max-width: 800px; margin: 4rem auto; }
        .tarot-card { aspect-ratio: 2/3; border: 1px solid var(--gold); border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: \"Playfair Display\"; }
    </style>
</head>
<body>
    <h1 style="font-family:\"Playfair Display\";">Imperial Tarot</h1>
    <div class="tarot-grid">
        <div class="tarot-card" onclick="alert(\"The Sovereign: 명확한 리더십이 필요한 시기입니다.\")">CARD 1</div>
        <div class="tarot-card" onclick="alert(\"The Alchemist: 아이디어를 현실로 바꿀 창조의 시간입니다.\")">CARD 2</div>
        <div class="tarot-card" onclick="alert(\"The Guard: 현재의 수익 구조를 공고히 해야 합니다.\")">CARD 3</div>
    </div>
    <a href="../../index.html" style="color:var(--gold); text-decoration:none;">RETURN</a>
    <script src="../../scripts/imperial-seo.js"></script>
    <script src="../../scripts/imperial-fx.String"></script>
</body>
</html>
