<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="../mobile-fix.css">
    <style>
        :root {
            --bg: #0a0a0b; 
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --card: rgba(255, 255, 255, 0.02);
            --border: rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Montserrat', sans-serif; overflow-x: hidden;
            background: radial-gradient(circle at 50% 0%, #1a1a1c 0%, #0a0a0b 70%);
            min-height: 100vh;
        }

        .container { width: 90%; max-width: 800px; margin: 0 auto; padding: 4rem 0; }

        header { text-align: center; margin-bottom: 5rem; }
        .tag { font-size: 0.65rem; letter-spacing: 5px; color: var(--gold); margin-bottom: 1.5rem; display: block; opacity: 0.8; }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 400; margin-bottom: 0.5rem; letter-spacing: -1px; }

        .tab-nav { display: flex; justify-content: center; gap: 3rem; margin-bottom: 4rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .tab-btn { 
            background: none; border: none; color: var(--text-dim); font-size: 0.75rem; font-weight: 700; 
            letter-spacing: 3px; cursor: pointer; transition: 0.3s; padding: 0.5rem 0;
        }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .module-panel { 
            background: var(--card); border: 1px solid var(--border); padding: 3rem; 
            display: none; animation: fadeIn 0.8s ease-out;
        }
        .module-panel.active { display: block; }

        label { font-size: 0.65rem; letter-spacing: 2px; color: var(--gold); margin-bottom: 1rem; display: block; text-transform: uppercase; }
        textarea, select {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            color: white; padding: 1.5rem; font-family: 'Montserrat'; font-size: 0.9rem;
            margin-bottom: 2rem; border-radius: 0;
        }

        .action-btn {
            width: 100%; background: var(--gold); color: black; border: none;
            padding: 1.3rem; font-size: 0.85rem; font-weight: 700; letter-spacing: 4px;
            cursor: pointer; transition: 0.4s;
        }
        .action-btn:hover { background: #f3e5ab; transform: translateY(-3px); box-shadow: 0 10px 40px rgba(212, 175, 55, 0.2); }

        .result-area { margin-top: 4rem; display: none; }
        .p-bar { height: 1px; background: var(--border); width: 100%; margin: 2rem 0; position: relative; }
        .p-bar-fill { height: 1px; background: var(--gold); position: absolute; left: 0; top: 0; width: 0; transition: 1s; box-shadow: 0 0 10px var(--gold); }

        .preview-box { height: 400px; background: #000; border: 1px solid var(--border); margin-top: 2rem; }

        .back-link { 
            display: block; margin-top: 5rem; text-align: center; color: var(--text-dim); text-decoration: none; 
            font-size: 0.7rem; letter-spacing: 3px; border-bottom: 1px solid transparent; transition: 0.3s;
        }
        .back-link:hover { color: var(--gold); border-bottom-color: var(--gold); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">

        <a href="../index.html" class="back-link">RETURN TO OVERLORD PORTAL</a>
    </div>

    <script src="../scripts/content-alchemist.js"></script>
    <script src="../scripts/imperial-seo.js"></script>
    <script>
        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.module-panel').forEach(p => p.classList.remove('active'));
            
            if(type === 'script') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('scriptPanel').classList.add('active');
            } else if(type === 'oracle') {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('oraclePanel').classList.add('active');
            } else if(type === 'meme') {
                document.querySelector('.tab-btn:nth-child(3)').classList.add('active');
                document.getElementById('memePanel').classList.add('active');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
             console.log("%c[SYSTEM] Content-Chef ?ΦΉπΕ Ά░Α???ΕΈμΝ.", "color: #d4af37; font-weight: bold;");
        });
    </script>
<script src="../scripts/imperial-fx.js"></script></body>
</html>
