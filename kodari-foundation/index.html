<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KODARI Foundation | Imperial Philanthropy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../mobile-fix.css">
    <style>
        :root {
            --bg: #0a0a0b; --gold: #d4af37; --text: #ffffff; --text-dim: rgba(255, 255, 255, 0.5); --border: rgba(212, 175, 55, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: "Montserrat"; line-height: 1.6; }
        .container { width: 90%; max-width: 1000px; margin: 0 auto; padding: 100px 0; }
        header { text-align: center; margin-bottom: 5rem; }
        header h1 { font-family: "Playfair Display"; font-size: 3rem; color: var(--gold); font-style: italic; }
        .vision-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
        .vision-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 3rem; }
        .vision-card i { font-size: 2rem; color: var(--gold); margin-bottom: 1.5rem; display: block; }
        .vision-card h2 { font-family: "Playfair Display"; margin-bottom: 1rem; }
        .vision-card p { font-size: 0.9rem; color: var(--text-dim); }
        .back-link { display: block; text-align: center; margin-top: 5rem; color: var(--gold); text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>KODARI Foundation</h1>
            <p style="margin-top:1rem; letter-spacing:3px; font-size:0.75rem; color:var(--text-dim);">SEEDED BY INTELLIGENCE, GROWN FOR HUMANITY</p>
        </header>

        <div class="vision-grid">
            <div class="vision-card">
                <i class="fa-solid fa-leaf"></i>
                <h2>지속 가능한 연산</h2>
                <p>제국의 수익은 다시 지능의 공정성을 위해 사용됩니다. 우리는 환경에 미치는 영향을 최소화하는 친환경 서버 인프라를 지원합니다.</p>
            </div>
            <div class="vision-card">
                <i class="fa-solid fa-graduation-cap"></i>
                <h2>지능의 평등</h2>
                <p>코다리 파운데이션은 소외된 계층이 AI 기술을 통해 스스로 자립할 수 있도록 교육 기회를 제공합니다.</p>
            </div>
        </div>

        <a href="../index.html" class="back-link">RETURN TO PORTAL</a>
    </div>

    <script src="../scripts/imperial-seo.js"></script>
    <script src="../scripts/imperial-fx.js"></script>
</body>
</html>
