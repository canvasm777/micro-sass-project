    <style>
        :root {
            --bg: #0a0a0b; 
            --gold: #d4af37; /* Champagne Gold */
            --gold-light: #f3e5ab;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
            --card: rgba(255, 255, 255, 0.02);
            --border: rgba(212, 175, 55, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Imperial Minimal Canvas */
        #nebula-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15;
            background: radial-gradient(circle at 50% -20%, #1a1a1c 0%, #0a0a0b 80%);
        }

        /* Top HUD */
        #imperial-hud {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 11, 0.8); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 50px;
            padding: 10px 30px; display: flex; gap: 30px; z-index: 1000;
            font-size: 0.7rem; letter-spacing: 2px;
        }
        .hud-item { display: flex; align-items: center; gap: 8px; font-weight: 400; color: var(--gold); }
        .hud-val { color: var(--text); font-weight: 700; }

        nav {
            width: 100%; max-width: 1200px; margin: 0 auto;
            padding: 100px 2rem 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-style: italic; letter-spacing: 4px; color: var(--gold); }
        .auth-btn { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 0.6rem 1.5rem; border-radius: 4px; cursor: pointer;
            font-size: 0.7rem; letter-spacing: 2px; transition: 0.4s;
        }
        .auth-btn:hover { background: var(--gold); color: #000; }

        header { text-align: center; padding: 6rem 1rem 4rem; max-width: 900px; margin: 0 auto; }
        header .valuation {
            font-size: 0.8rem; letter-spacing: 3px; color: var(--gold);
            margin-bottom: 2rem; display: block; opacity: 0.8;
        }
        header h1 { 
            font-family: 'Playfair Display', serif; font-size: 4rem; font-weight: 400;
            letter-spacing: -1px; margin-bottom: 2rem; color: #fff;
        }
        header p { 
            font-weight: 200; font-size: 1.1rem; color: var(--text-dim); 
            max-width: 600px; margin: 0 auto; letter-spacing: 1px;
        }

        .section-tag {
            text-align: center; font-size: 0.65rem; letter-spacing: 5px; color: var(--gold);
            margin-bottom: 3rem; text-transform: uppercase; opacity: 0.6;
        }

        /* Card Grid - The Fortress Walls */
        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem;
            width: 100%; max-width: 1000px; margin: 0 auto 6rem; padding: 0 2rem;
        }

        .card {
            background: var(--card); border: 1px solid var(--border);
            padding: 3rem; border-radius: 0px; text-decoration: none; color: white;
            transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative; overflow: hidden;
        }
        .card:hover {
            background: rgba(212, 175, 55, 0.03); border-color: var(--gold);
            transform: translateY(-5px);
        }
        .card i { font-size: 1.8rem; color: var(--gold); margin-bottom: 2rem; display: block; opacity: 0.8; }
        .card h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 1rem; letter-spacing: 1px; }
        .card p { color: var(--text-dim); font-size: 0.85rem; font-weight: 200; line-height: 1.8; }
        
        .card .badge {
            position: absolute; top: 2rem; right: 2rem; font-size: 0.6rem;
            letter-spacing: 2px; color: var(--gold); opacity: 0.5;
        }

        /* Ad Layout Box */
        .adsense-box {
            width: 100%; max-width: 1000px; height: 120px; margin: 4rem auto;
            border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; color: var(--text-dim); letter-spacing: 4px;
        }

        /* Footer */
        footer {
            text-align: center; padding: 6rem 2rem; border-top: 1px solid var(--border);
            margin-top: 4rem; opacity: 0.4; font-size: 0.7rem; letter-spacing: 3px;
        }

        /* [The Royal Pardon] Loading л¬ёкө¬ */
        .loader-text { font-style: italic; color: var(--gold); }

        /* Mobile Fix */

            #imperial-hud { width: 90%; gap: 15px; padding: 10px 20px; font-size: 0.6rem; top: 10px; flex-wrap: wrap; justify-content: center; }
            header h1 { font-size: 2.5rem; letter-spacing: 0px; }
            header p { font-size: 0.9rem; }
            .grid { grid-template-columns: 1fr; padding: 0 1.5rem; }
            .card { padding: 2.5rem; }
        }
    </style>
