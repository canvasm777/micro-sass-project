        .workspace {

        .action-btn:hover { background: #f3e5ab; transform: translateY(-3px); box-shadow: 0 10px 40px rgba(212, 175, 55, 0.2); }

        .caption-card {

        .caption-card:hover { border-color: var(--gold); }
        .caption-text { font-size: 0.95rem; line-height: 1.8; margin-bottom: 1.5rem; white-space: pre-wrap; }
        
        .copy-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 0.6rem 1.2rem; font-size: 0.65rem; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s;

        .copy-btn:hover { background: var(--gold); color: black; }

        .back-link {

            font-size: 0.7rem; letter-spacing: 3px; border-bottom: 1px solid transparent; transition: 0.3s;
        }
        .back-link:hover { color: var(--gold); border-bottom-color: var(--gold); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
