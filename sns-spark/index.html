<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS-Spark | Imperial Caption Alchemist ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../mobile-fix.css">
    <style>
        :root {
            --bg: #0a0a0b; --gold: #d4af37; --text: #ffffff; --text-dim: rgba(255, 255, 255, 0.5); --border: rgba(212, 175, 55, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat'; min-height: 100vh; }
        .container { width: 90%; max-width: 800px; margin: 0 auto; padding: 4rem 0; }
        header { text-align: center; margin-bottom: 5rem; }
        .workspace { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 3rem; }
        textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 1rem; margin-bottom: 1.5rem; }
        .action-btn { width: 100%; background: var(--gold); color: #000; padding: 1.5rem; border: none; font-weight: 700; cursor: pointer; }
        .result-panel { margin-top: 4rem; display: none; }
        .caption-card { border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1rem; position: relative; }
        .copy-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 0.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1 style="font-family:'Playfair Display';">SNS-Spark</h1></header>
        <div class="workspace">
            <textarea id="ideaInput" placeholder="Business Idea..."></textarea>
            <select id="toneSelect">
                <option value="luxury">Quiet Luxury</option>
                <option value="aggressive">Aggressive Growth</option>
                <option value="intellectual">Intellectual Rebel</option>
            </select>
            <button class="action-btn" onclick="igniteSpark()">IGNITE CAPTIONS</button>
        </div>
        <div id="resultPanel" class="result-panel">
            <div id="captionList"></div>
        </div>
        <a href="../index.html" style="display:block; text-align:center; color:var(--text-dim); margin-top:4rem;">RETURN</a>
    </div>
    <script src="../scripts/imperial-seo.js"></script>
    <script src="../scripts/imperial-fx.js"></script>
    <script>
        const CAPTION_TEMPLATES = {
            luxury: ["Silence proves value. \n\n{idea}\n\nDecision is yours. #Empire"],
            aggressive: ["Don't ask how, ask when. \n\n{idea}\n\n#Growth"],
            intellectual: ["Is your common sense yours? \n\n{idea}\n\n#Deep"]
        };
        function igniteSpark() {
            const idea = document.getElementById('ideaInput').value;
            if(!idea) return;
            const tone = document.getElementById('toneSelect').value;
            const list = document.getElementById('captionList');
            const panel = document.getElementById('resultPanel');
            list.innerHTML = '';
            panel.style.display = 'block';
            CAPTION_TEMPLATES[tone].forEach(t => {
                const final = t.replace('{idea}', idea);
                list.innerHTML += `<div class="caption-card"><p>${final}</p><button class="copy-btn" onclick="copyCaption(this)">COPY</button></div>`;
            });
        }
        function copyCaption(btn) {
            const text = btn.previousElementSibling.innerText;
            navigator.clipboard.writeText(text + "\n\n👉 Experience the Empire: https://micro-sass-project.pages.dev").then(() => {
                btn.innerText = "COPIED!";
            });
        }
    </script>
</body>
</html>
