<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS-Spark ✨ | AI Instagram Caption Maker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../auth.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem;">
                <div class="trending-badge" style="background: rgba(37, 244, 140, 0.1); color: var(--primary); padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: bold; border: 1px solid rgba(37, 244, 140, 0.2);">🔥 Trending in Seoul</div>
                <div class="credit-badge" style="background: rgba(255,255,255,0.05); color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem;">🪙 <span id="creditCount">5</span> Credits</div>
            </div>
            <h1>SNS-Spark ✨</h1>
            <p>제품 사진을 넣으면 영자의 감성 캡션이 쏟아집니다.</p>
            <div id="adsense-top" style="margin: 1rem 0; font-size: 0.6rem; opacity: 0.2;">[AdSense Auto-Ads Slot]</div>
        </header>
        <main>
            <div id="loadingContainer" class="hidden" style="margin-bottom: 2rem;">
                <div class="progress-bar-bg" style="width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden;">
                    <div id="progressBar" style="width: 0%; height: 100%; background: var(--primary); transition: width 0.3s ease;"></div>
                </div>
                <p style="font-size: 0.7rem; margin-top: 8px; opacity: 0.6; text-align: left;">AI 스쿼드가 픽셀 단위로 감성 분석 중...</p>
            </div>
            <div class="control-panel" style="margin-bottom: 1.5rem; display: flex; gap: 1rem; justify-content: center;">
                <select id="toneSelect" style="background: var(--card-bg); color: white; border: 1px solid var(--glass-border); padding: 0.5rem; border-radius: 12px; outline: none;">
                    <option value="Professional">전문적인</option>
                    <option value="Witty">위트있는</option>
                    <option value="Emotional">감성적인</option>
                </select>
            </div>
            <div class="upload-area" id="uploadArea">
                <i class="fa-solid fa-camera"></i>
                <p>제품 사진을 업로드하거나 촬영하세요.</p>
                <span style="font-size: 0.8rem; opacity: 0.6;">(Tap to select/capture)</span>
                <input type="file" id="fileInput" accept="image/*" class="hidden">
            </div>
            
            <div id="imagePreview" class="hidden" style="margin-bottom: 2rem;">
                <img id="previewImg" src="" style="width: 100%; border-radius: 12px; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.1);">
                <button onclick="resetUpload()" style="background: rgba(255,0,0,0.1); color: #ff4d4d; border: 1px solid rgba(255,0,0,0.2); padding: 8px 16px; border-radius: 8px; cursor: pointer;">다시 찍기</button>
            </div>
            
            <div id="sparkHistory" class="hidden" style="margin-top: 2rem; text-align: left;">
                <h4 style="font-size: 0.8rem; opacity: 0.4; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; margin-bottom: 1rem;">최근 생성 내역</h4>
                <div id="historyList"></div>
            </div>
            
            <div class="caption-results" id="resultsArea">
                <!-- Results will be injected here -->
            </div>
        </main>
        <footer>
            <div class="app-switcher" style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05);">
                <a href="../sns-spark/index.html" class="active" style="color: var(--primary); font-weight: bold; font-size: 0.8rem; text-decoration: none;">Spark</a>
                <a href="../interview-ace/index.html" style="opacity: 0.4; font-size: 0.8rem; cursor: pointer; color: white; text-decoration: none;">Ace</a>
                <a href="../quick-invoice/index.html" style="opacity: 0.4; font-size: 0.8rem; cursor: pointer; color: white; text-decoration: none;">Invoice</a>
            </div>
            <p>© 2026 Kodari Squad - Ultra Performance Mode</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
