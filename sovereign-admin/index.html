<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../mobile-fix.css">
    <style>
        :root {
            --bg: #0a0a0b; 
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --card: rgba(255, 255, 255, 0.02);
            --border: rgba(212, 175, 55, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Montserrat', sans-serif; display: flex; 
            min-height: 100vh; overflow-x: hidden;
        }

        /* Sovereign Sidebar */
        aside {
            width: 280px; background: #000; border-right: 1px solid var(--border);
            padding: 3rem 2rem; display: flex; flex-direction: column; height: 100vh;
            position: sticky; top: 0;
        }
        .side-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold); letter-spacing: 4px; margin-bottom: 4rem; }
        
        .nav-group { display: flex; flex-direction: column; gap: 1.5rem; }
        .nav-item { 
            text-decoration: none; color: var(--text-dim); font-size: 0.75rem; letter-spacing: 2px;
            display: flex; align-items: center; gap: 15px; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { color: var(--gold); transform: translateX(5px); }

        /* Main Content */
        main { flex-grow: 1; padding: 4rem; background: radial-gradient(circle at 100% 0%, #1a1a1c 0%, #0a0a0b 50%); }

        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5rem; }
        .top-meta { text-align: right; font-size: 0.65rem; letter-spacing: 2px; color: var(--text-dim); }
        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 400; margin-bottom: 0.5rem; }

        /* Stats Bar */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; margin-bottom: 4rem; }
        .stat-card { 
            background: var(--card); border: 1px solid var(--border); padding: 2rem;
            text-align: left; transition: 0.4s;
        }
        .stat-card:hover { border-color: var(--gold); background: var(--gold-dim); }
        .stat-label { font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); margin-bottom: 1rem; display: block; }
        .stat-val { font-family: 'Playfair Display', serif; font-size: 1.8rem; }

        /* Module Fleet */
        .section-tag { font-size: 0.65rem; letter-spacing: 5px; color: var(--gold); margin-bottom: 2rem; display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        
        .mod-card {
            background: var(--card); border: 1px solid var(--border); padding: 2rem;
            position: relative; overflow: hidden;
        }
        .mod-header { display: flex; justify-content: space-between; margin-bottom: 1.5rem; }
        .status-badge { font-size: 0.6rem; letter-spacing: 1px; color: #10b981; }
        .mod-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 0.5rem; }
        .mod-role { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }

        .progress-line { height: 1px; background: var(--border); margin: 1.5rem 0; position: relative; }
        .progress-fill { height: 1px; background: var(--gold); position: absolute; left: 0; top: 0; box-shadow: 0 0 10px var(--gold); }

        /* Action Modal Trigger */
        .edict-btn {
            background: var(--gold); color: #000; border: none; padding: 1.2rem 2.5rem;
            font-size: 0.8rem; font-weight: 700; letter-spacing: 4px; cursor: pointer;
            transition: 0.4s;
        }
        .edict-btn:hover { background: #f3e5ab; transform: translateY(-3px); }

        @media (max-width: 1024px) {
            aside { display: none; }
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
