<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Admin | Empire Control Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b; --gold: #d4af37; --text: #ffffff; --border: rgba(212, 175, 55, 0.2);
        }
        body { background: var(--bg); color: var(--text); font-family: "Montserrat"; margin: 0; }
        .sidebar { position: fixed; width: 250px; height: 100vh; border-right: 1px solid var(--border); padding: 2rem; }
        .main { margin-left: 250px; padding: 4rem; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        .stat-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 2rem; }
        .stat-card h3 { color: var(--gold); font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 1rem; }
        .stat-card .val { font-size: 2rem; font-family: "Playfair Display"; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="font-family:\"Playfair Display\"; color:var(--gold);">Sovereign</h2>
        <nav style="margin-top:4rem;">
            <p style="margin-bottom:1rem; opacity:0.5;">DASHBOARD</p>
            <p style="margin-bottom:1rem; opacity:0.5;">REVENUE</p>
            <p style="margin-bottom:1rem; opacity:0.5;">CITIZENS</p>
        </nav>
    </div>
    <div class="main">
        <h1 style="font-family:\"Playfair Display\"; margin-bottom:4rem;">Empire Overview</h1>
        <div class="stat-grid">
            <div class="stat-card">
                <h3>TOTAL REVENUE</h3>
                <div class="val">248,000,000</div>
            </div>
            <div class="stat-card">
                <h3>ACTIVE NODES</h3>
                <div class="val">1,204</div>
            </div>
            <div class="stat-card">
                <h3>INTEGRITY</h3>
                <div class="val">99.9%</div>
            </div>
        </div>
        <a href="../index.html" style="display:block; margin-top:4rem; color:var(--gold); text-decoration:none;">RETURN TO PORTAL</a>
    </div>
    <script src="../scripts/imperial-seo.js"></script>
    <script src="../scripts/imperial-fx.js"></script>
</body>
</html>
