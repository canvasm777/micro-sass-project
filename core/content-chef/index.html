<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content-Chef | Imperial AI Alchemist 🎬</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../mobile-fix.css">
    <style>
        :root {
            --bg: #0a0a0b; --gold: #d4af37; --text: #ffffff; --text-dim: rgba(255, 255, 255, 0.5); --border: rgba(212, 175, 55, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat'; min-height: 100vh; }
        .container { width: 90%; max-width: 800px; margin: 0 auto; padding: 4rem 0; }
        header { text-align: center; margin-bottom: 5rem; }
        .tab-nav { display: flex; justify-content: center; gap: 3rem; margin-bottom: 4rem; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: var(--text-dim); padding: 1rem; cursor: pointer; font-weight: 700; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .module-panel { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 3rem; display: none; }
        .module-panel.active { display: block; }
        textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 1rem; margin-bottom: 1.5rem; }
        .action-btn { width: 100%; background: var(--gold); color: #000; padding: 1.5rem; border: none; font-weight: 700; cursor: pointer; }
        .result-area { margin-top: 2rem; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 style="font-family:'Playfair Display'; font-size: 3rem;">Content-Chef</h1>
        </header>
        <nav class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('script')">SCRIPT-TO-VIDEO</button>
            <button class="tab-btn" onclick="switchTab('oracle')">SHORTS-ORACLE</button>
            <button class="tab-btn" onclick="switchTab('meme')">INFINITE-MEME</button>
        </nav>
        <div id="scriptPanel" class="module-panel active">
            <textarea id="scriptInput" placeholder="Ideation..."></textarea>
            <select id="voiceSelect"><option>The Sovereign (Deep)</option></select>
            <button class="action-btn" onclick="startScriptAlchemy()">FORGE VIDEO DRAFT</button>
            <div id="alchemyProgress" class="result-area">
                <div id="scriptOutput" style="background:rgba(0,0,0,0.5); padding:1rem;"></div>
                <div id="videoPreview" style="height:300px; background:#000; margin-top:1rem;"></div>
            </div>
        </div>
        <div id="oraclePanel" class="module-panel">
            <textarea id="youtubeUrl" placeholder="YouTube URL..."></textarea>
            <button class="action-btn" onclick="predictViralMoments()">PREDICT VIRAL MOMENTS</button>
            <div id="oracleResult" class="result-area"></div>
        </div>
        <div id="memePanel" class="module-panel">
            <button class="action-btn" onclick="generateImperialMeme()">FORGE TRENDING MEME</button>
            <div id="memeResult" class="result-area"></div>
        </div>
        <a href="../../index.html" style="display:block; text-align:center; color:var(--text-dim); margin-top:4rem;">RETURN</a>
    </div>
    <script src="../../scripts/content-alchemist.js"></script>
    <script src="../../scripts/imperial-seo.js"></script>
    <script src="../../scripts/imperial-fx.js"></script>
    <script>
        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.module-panel').forEach(p => p.classList.remove('active'));
            if(type === 'script') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('scriptPanel').classList.add('active');
            } else if(type === 'oracle') {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('oraclePanel').classList.add('active');
            } else if(type === 'meme') {
                document.querySelector('.tab-btn:nth-child(3)').classList.add('active');
                document.getElementById('memePanel').classList.add('active');
            }
        }
    </script>
</body>
</html>
