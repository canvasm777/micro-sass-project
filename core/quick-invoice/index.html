<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickInvoice | Smart Wealth Archive 🧾</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="../../assets/scripts/ads-engine.js"></script>
    <script src="../../auth.js"></script>
    <script defer src="main.js"></script>
</head>
<body>
    <div id="app">
        <!-- ... existing header ... -->
        <header>
            <div style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem;">
                <select id="currencySelect">
                    <option value="KRW">₩ (KRW)</option>
                    <option value="USD">$ (USD)</option>
                    <option value="JPY">¥ (JPY)</option>
                </select>
            </div>
            <h1>사라지는 영수증을 <span class="glitch" data-text="지켜라!">지켜라!</span></h1>
            <p>AI가 스캔하고 엑셀로 딱~ 🧾💨</p>
        </header>

        <main>
            <div class="upload-area" id="dropzone">
                <div id="scannerLine" class="hidden"></div>
                <i class="fa-solid fa-receipt"></i>
                <h2 style="font-weight: 900; letter-spacing: 2px; margin-bottom: 0.5rem; color: var(--accent);">SMART SCAN</h2>
                <p style="opacity: 0.6; font-size: 0.9rem;">영수증을 업로드하면 AI가 즉시 데이터를 분석합니다</p>
                <input type="file" id="fileInput" hidden>
            </div>

            <div id="filterArea" class="hidden">
                <h4 style="font-size: 0.7rem; opacity: 0.3; letter-spacing: 5px; margin-bottom: 1.5rem;">SELECT ANALYSIS SPAN</h4>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <input type="date" id="startDate" style="flex: 1;">
                    <span style="opacity: 0.2;">TO</span>
                    <input type="date" id="endDate" style="flex: 1;">
                    <button id="analyzeBtn" onclick="generateReport()" style="background: var(--primary); color: #fff; border: 3px solid #fff; padding: 0.8rem 2rem; border-radius: 0; font-weight: 900; cursor: pointer; box-shadow: 4px 4px 0 #000;">ARCHIVE START 📁</button>
                </div>
            </div>

            <!-- Report View Modal (New) -->
            <div id="reportView" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px;">
                <div style="background: #111; border: 3px solid var(--primary); padding: 2rem; max-width: 600px; width: 100%; position: relative; box-shadow: 20px 20px 0 rgba(37, 244, 140, 0.1);">
                    <button onclick="closeReport()" style="position: absolute; top: -15px; right: -15px; background: #fff; border: 2px solid #000; width: 40px; height: 40px; font-weight: bold; cursor: pointer;">X</button>
                    <div id="reportContent"></div>
                    <button onclick="exportToExcel()" style="width: 100%; margin-top: 2rem; background: #fff; color: #000; border: none; padding: 1rem; font-weight: 900; cursor: pointer;">EXCEL DOWNLOAD (.CSV) 📊</button>
                </div>
            </div>

            <div id="result" class="hidden" style="margin-top: 3rem;">
                <h3 style="font-size: 0.8rem; opacity: 0.3; letter-spacing: 5px; margin-bottom: 1.5rem;">TREASURY SUMMARY</h3>
                <div class="stats-chart">
                    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 1rem; opacity: 0.6; letter-spacing: 1px;">
                        <span>BUSINESS ASSETS vs PERSONAL</span>
                        <span id="chart-total">0 KRW</span>
                    </div>
                    <div class="chart-bar-container">
                        <div id="biz-bar" style="width: 70%; background: var(--primary);"></div>
                        <div id="personal-bar" style="width: 30%; background: var(--accent);"></div>
                    </div>
                </div>
                
                <div id="data-display">
                    <!-- Result cards injected here -->
                </div>

                <!-- History Area -->
                <div id="invoiceHistory" class="hidden" style="margin-top: 3rem;">
                    <h3 style="font-size: 0.8rem; opacity: 0.3; letter-spacing: 5px; margin-bottom: 1.5rem;">HISTORY ARCHIVE</h3>
                    <div id="historyList" style="display: grid; gap: 1rem;"></div>
                </div>

                <div style="text-align: center; margin-top: 3rem;">
                    <button onclick="resetUpload()" style="background: var(--secondary); border: 3px solid #fff; color: white; padding: 1rem 3rem; cursor: pointer; font-size: 0.9rem; font-weight: 900; box-shadow: 4px 4px 0 #000;">KEEP MY MONEY 💰</button>
                    <p style="font-size: 0.7rem; color: var(--primary); font-weight: 900; margin-top: 1.5rem; cursor: pointer; text-decoration: underline;" onclick="clearHistory()">HISTORY HACKING (DELETE)</p>
                </div>
            </div>
        </main>

        <footer>
            <div class="app-switcher">
                <a href="../../core/sns-spark/index.html">Spark</a>
                <a href="../../core/interview-ace/index.html">Ace</a>
                <a href="../../core/quick-invoice/index.html" class="active">Invoice</a>
                <a href="../va-agency/index.html">VA Agency</a>
                <a href="../../admin/sovereign-admin/index.html">Admin</a>
            </div>
            <p>© 2026 KODARI WEALTH ARCHIVE | NO-LEAK POLICY</p>
        </footer>
    </div>
</body>
</html>
