<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS-Spark | Imperial Caption Alchemist ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../mobile-fix.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Design System Adjustments */
        h1 { font-family: 'Playfair Display', serif; font-style: italic; }
        .imperial-hud {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 11, 0.8); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 50px;
            padding: 10px 30px; display: flex; gap: 30px; z-index: 1000;
            font-size: 0.7rem; letter-spacing: 2px; color: var(--primary);
        }
        .hud-val { color: #fff; font-weight: 700; }
        #nebula-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% -20%, #1a1a1c 0%, #0a0a0b 80%);
        }
    </style>
</head>
<body>
    <div id="nebula-canvas"></div>
    
    <div class="imperial-hud">
        <div class="hud-item"><i class="fa-solid fa-bolt"></i> CREDITS: <span id="creditCount" class="hud-val">5</span></div>
        <div class="hud-item"><i class="fa-solid fa-shield-halved"></i> ACCESS: <span class="hud-val">SOVEREIGN</span></div>
    </div>

    <div id="app">
        <header>
            <div class="header-meta">
                <span class="trending-badge"><i class="fa-solid fa-chart-line"></i> VIRAL TRENDING</span>
                <span class="credit-badge"><i class="fa-solid fa-crown"></i> PREMIUM ACTIVE</span>
            </div>
            <h1>SNS-Spark</h1>
            <p>당신의 비주얼을 완성할 절대적 인공지능 캡션 연금술.</p>
        </header>

        <!-- Image Upload & Preview -->
        <div class="control-panel" style="margin-bottom: 2rem;">
            <div id="uploadArea" class="upload-area">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <p>사진을 드래그하거나 클릭하여 업로드하세요</p>
                <small style="opacity:0.3; display:block; margin-top:1rem;">Professional / Witty / Emotional AI Analysis</small>
            </div>
            
            <input type="file" id="fileInput" accept="image/*" class="hidden">

            <div id="imagePreview" class="preview-container hidden">
                <img id="previewImg" src="">
                <div id="textOverlay"></div>
            </div>
        </div>

        <!-- Tone & Action -->
        <div class="action-panel">
            <div class="control-panel" style="display:flex; gap:10px; margin-bottom:2rem;">
                <select id="toneSelect" style="flex:1;">
                    <option value="Professional">👑 Professional (신뢰/품격)</option>
                    <option value="Witty">⚡ Witty (트렌디/힙함)</option>
                    <option value="Emotional">✨ Emotional (감성/새벽)</option>
                </select>
                <button onclick="resetUpload()" style="padding:0 1.5rem; border-radius:12px; border:1px solid var(--border); background:none; color:white; cursor:pointer;"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
        </div>

        <!-- Progress -->
        <div id="loadingContainer" class="hidden" style="margin-bottom:2rem;">
            <p style="font-size:0.75rem; letter-spacing:2px; margin-bottom:10px; opacity:0.5;">ANALYZING VISUAL CONTEXT...</p>
            <div class="progress-bar-bg">
                <div id="progressBar" style="width: 0%"></div>
            </div>
        </div>

        <!-- Results -->
        <div class="caption-results" style="display:none;">
            <!-- main.js will inject results here -->
        </div>

        <!-- History -->
        <section id="sparkHistory" class="hidden" style="margin-top:4rem; border-top:1px solid var(--border); padding-top:2rem;">
            <h4>CHRONICLES OF SPARKS</h4>
            <div id="historyList"></div>
        </section>

        <div class="app-switcher">
            <a href="../../index.html" class="active">PORTAL</a>
            <a href="../content-chef/index.html">CHEF</a>
            <a href="../quick-invoice/index.html">INVOICE</a>
        </div>
        <footer>
            <p>© 2026 KODARI EMPIRE | SOVEREIGN INTELLIGENCE</p>
        </footer>
    </div>

    <script src="../../scripts/imperial-seo.js"></script>
    <script src="../../scripts/imperial-fx.js"></script>
    <script src="main.js"></script>
</body>
</html>
