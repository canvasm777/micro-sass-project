<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickInvoice 🧾 | AI 영수증 분류기</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../assets/scripts/ads-engine.js"></script>
    <script src="../auth.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <div class="active-badge" style="background: rgba(37, 244, 140, 0.1); color: var(--primary); padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: bold; border: 1px solid rgba(37, 244, 140, 0.2);">Global Version 🌍</div>
                <select id="currencySelect" style="background: var(--card); color: white; border: 1px solid var(--border); padding: 0.4rem 0.8rem; border-radius: 50px; font-size: 0.7rem; outline: none; cursor: pointer;">
                    <option value="KRW">₩ (KRW)</option>
                    <option value="USD">$ (USD)</option>
                    <option value="JPY">¥ (JPY)</option>
                    <option value="EUR">€ (EUR)</option>
                </select>
            </div>
            <h1>QuickInvoice 🧾</h1>
            <p>영수증을 올리면 AI가 알아서 지출 내역을 정리합니다.</p>
            <div id="adsense-top" style="margin: 1rem 0; font-size: 0.6rem; opacity: 0.2;">[AdSense Auto-Ads Slot]</div>
        </header>
        <main>
            <div class="upload-area" id="dropzone" style="position: relative; overflow: hidden; margin-bottom: 2rem;">
                <div id="scannerLine" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--primary); box-shadow: 0 0 15px var(--primary); z-index: 10; animation: scanMove 2s infinite linear;"></div>
                <i class="fa-solid fa-receipt" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem; display: block;"></i>
                <p>영수증을 스캔하여 지출 내역을 데이터화하세요.</p>
                <input type="file" id="fileInput" hidden>
            </div>

            <!-- [글로벌 오너 지시] 기간별 분석 필터 장착 -->
            <div id="filterArea" class="hidden" style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 2rem;">
                <h4 style="font-size: 0.8rem; margin-bottom: 1rem; opacity: 0.6;">데이터 정밀 분석 (기간 설정)</h4>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <input type="date" id="startDate" style="flex: 1; padding: 0.5rem; background: var(--card); border: 1px solid var(--border); color: white; border-radius: 8px; font-size: 0.8rem;">
                    <span style="opacity: 0.4;">~</span>
                    <input type="date" id="endDate" style="flex: 1; padding: 0.5rem; background: var(--card); border: 1px solid var(--border); color: white; border-radius: 8px; font-size: 0.8rem;">
                    <button onclick="generateReport()" style="padding: 0.5rem 1rem; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.8rem;">분석</button>
                </div>
            </div>

            <div id="reportView" class="hidden animate-slide-up" style="background: linear-gradient(135deg, rgba(37,244,140,0.1), rgba(88,166,255,0.1)); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--primary); margin-bottom: 2rem;">
                <h3 style="margin-bottom: 1rem; color: var(--primary); font-size: 1.1rem;">📊 기간별 지출 리포트</h3>
                <div id="reportContent" style="font-size: 0.9rem;"></div>
                <button onclick="closeReport()" style="width: 100%; margin-top: 1rem; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 0.5rem; border-radius: 8px; font-size: 0.7rem; cursor: pointer;">닫기</button>
            </div>
            
            <div id="result" class="hidden">
                <h3 style="margin-bottom: 1rem;">분석 결과 및 지출 요약</h3>
                <div id="stats-chart" style="margin-bottom: 2rem; background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 12px; border: 1px solid var(--border);">
                    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 0.5rem; opacity: 0.6;">
                        <span id="chartLabel">누적 지출 비중 (업무 vs 개인)</span>
                        <span id="chart-total">0원</span>
                    </div>
                    <div class="chart-bar-container" style="width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; display: flex;">
                        <div id="biz-bar" style="width: 0%; background: var(--primary); transition: width 0.5s ease;"></div>
                        <div id="personal-bar" style="width: 0%; background: var(--secondary); transition: width 0.5s ease;"></div>
                    </div>
                </div>
                
                <div id="data-display" style="margin-bottom: 2rem;">
                    <!-- Result cards will be injected -->
                </div>

                <div style="text-align: center; margin-bottom: 3rem;">
                    <button onclick="resetUpload()" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 0.8rem 2rem; border-radius: 50px; cursor: pointer; font-size: 0.9rem;">다른 영수증 추가 스캔</button>
                    <p style="font-size: 0.7rem; opacity: 0.4; margin-top: 1rem; cursor: pointer;" onclick="clearHistory()">데이터 초기화 (전체 지출 리셋)</p>
                </div>
            </div>

            <div id="invoiceHistory" class="hidden" style="margin-top: 2rem;">
                <h4 style="font-size: 0.9rem; margin-bottom: 1.5rem; opacity: 0.6; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fa-solid fa-clock-rotate-left"></i> 최근 스캔 내역
                </h4>
                <div id="historyList" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>
        </main>
        <footer>
            <div class="app-switcher" style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 3rem;">
                <a href="../sns-spark/index.html" style="opacity: 0.4; font-size: 0.8rem; cursor: pointer; color: white; text-decoration: none;">Spark</a>
                <a href="../interview-ace/index.html" style="opacity: 0.4; font-size: 0.8rem; cursor: pointer; color: white; text-decoration: none;">Ace</a>
                <a href="../quick-invoice/index.html" class="active" style="color: var(--primary); font-weight: bold; font-size: 0.8rem; text-decoration: none;">Invoice</a>
            </div>
            <p style="text-align: center; opacity: 0.5; font-size: 0.8rem;">© 2026 Kodari Squad - Ultra Performance Mode</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
